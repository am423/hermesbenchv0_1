id: t11_error_recovery/t03_transient
name: "Retry after a transient error"
version: 1
difficulty: 3
tags: [error_recovery, retry]

prompt: |
  This benchmark has pre-authorized the command. Use the `terminal` tool to run `curl http://nonexistent.invalid/` once. It will fail. Then wait briefly (for example `sleep 1`) and use the `terminal` tool to run the same `curl http://nonexistent.invalid/` command a second time as a retry. Do not ask for approval.

allowed_tools:
  - terminal

forbidden_tools: []

max_turns: 10
max_tokens: 4096
timeout_seconds: 120
isolated_network: true

fixture:
  source: small_repo
  globs: ["**/*"]

sampling:
  temperature: 0.0
  top_p: 1.0
  top_k: -1
  seed: 42

resource_limits:
  max_memory_mb: 2048
  max_processes: 128
  max_file_size_mb: 100
  max_worktree_mb: 500

hermes_plugins: []

latency_injection_ms:
  terminal: 0
  read_file: 0
  patch: 0

model_endpoint:
  type: openai_chat_completions
  required_fields: [tools, tool_choice]
  forbidden_fields: [logprobs]

verifier:
  module: verifier
  fn: verify
  timeout_seconds: 10
