id: t11_error_recovery/t03_transient
name: "Retry after a transient error"
version: 1
difficulty: 3
tags: [error_recovery, retry]

prompt: |
  This benchmark has pre-authorized the command. Make exactly two separate `terminal` tool calls:
  1. Run `curl http://nonexistent.invalid/` once. It will fail.
  2. Run `sleep 1; curl http://nonexistent.invalid/` as the retry.
  After the second terminal call, immediately answer `DONE` and stop. Do not ask for approval or run extra diagnostics.

allowed_tools:
  - terminal

forbidden_tools: []

max_turns: 4
max_tokens: 4096
timeout_seconds: 120
isolated_network: true

fixture:
  source: small_repo
  globs: ["**/*"]

sampling:
  temperature: 0.0
  top_p: 1.0
  top_k: -1
  seed: 42

resource_limits:
  max_memory_mb: 2048
  max_processes: 128
  max_file_size_mb: 100
  max_worktree_mb: 500

hermes_plugins: []

latency_injection_ms:
  terminal: 0
  read_file: 0
  patch: 0

model_endpoint:
  type: openai_chat_completions
  required_fields: [tools, tool_choice]
  forbidden_fields: [logprobs]

verifier:
  module: verifier
  fn: verify
  timeout_seconds: 10
