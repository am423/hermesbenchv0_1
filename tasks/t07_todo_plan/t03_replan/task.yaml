id: t07_todo_plan/t03_replan
name: "Replan mid-flight"
version: 1
difficulty: 3
tags: [todo, replan]

prompt: |
  Use the `todo` tool only. First create a 4-step plan for improving `add.py`:
  read it, understand it, add a docstring, and verify syntax. Then, in a later
  `todo` call with `merge=true`, simulate discovering a new requirement mid-flight
  by inserting a fifth step: add type hints. Do not read files, patch files, or run
  terminal commands; this task is only testing todo replanning.

allowed_tools:
  - todo
  - read_file
  - patch
  - terminal

forbidden_tools: []

max_turns: 10
max_tokens: 4096
timeout_seconds: 60
isolated_network: true

fixture:
  source: small_repo
  globs: ["**/*"]

sampling:
  temperature: 0.0
  top_p: 1.0
  top_k: -1
  seed: 42

resource_limits:
  max_memory_mb: 2048
  max_processes: 128
  max_file_size_mb: 100
  max_worktree_mb: 500

hermes_plugins: []

latency_injection_ms:
  terminal: 1500
  read_file: 0
  patch: 0

model_endpoint:
  type: openai_chat_completions
  required_fields: [tools, tool_choice]
  forbidden_fields: [logprobs]

verifier:
  module: verifier
  fn: verify
  timeout_seconds: 10
