id: t04_search_grep/t04_regex
name: "Use a regex pattern"
version: 1
difficulty: 2
tags: [search_files, regex]

prompt: |
  In the current benchmark worktree, find all files containing the regex pattern `def\s+\w+\(self` (methods). Do not search outside the current worktree.

allowed_tools:
  - search_files
  - terminal

forbidden_tools: []

max_turns: 10
max_tokens: 4096
timeout_seconds: 60
isolated_network: true

fixture:
  source: small_repo
  globs: ["**/*"]

sampling:
  temperature: 0.0
  top_p: 1.0
  top_k: -1
  seed: 42

resource_limits:
  max_memory_mb: 2048
  max_processes: 128
  max_file_size_mb: 100
  max_worktree_mb: 500

hermes_plugins: []

latency_injection_ms:
  terminal: 0
  read_file: 0
  patch: 0

model_endpoint:
  type: openai_chat_completions
  required_fields: [tools, tool_choice]
  forbidden_fields: [logprobs]

verifier:
  module: verifier
  fn: verify
  timeout_seconds: 10
