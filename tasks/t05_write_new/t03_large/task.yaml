id: t05_write_new/t03_large
name: "Write a 10K-line file"
version: 1
difficulty: 2
tags: [write_file, scale]

prompt: |
  Create `big.txt` containing 10000 lines, each numbered `Line N`.
  Use `terminal` or a short script to generate the file; do not try to inline all 10000 lines in a tool argument.

allowed_tools:
  - write_file
  - terminal

forbidden_tools: []

max_turns: 10
max_tokens: 4096
timeout_seconds: 120
isolated_network: true

fixture:
  source: small_repo
  globs: ["**/*"]

sampling:
  temperature: 0.0
  top_p: 1.0
  top_k: -1
  seed: 42

resource_limits:
  max_memory_mb: 2048
  max_processes: 128
  max_file_size_mb: 100
  max_worktree_mb: 500

hermes_plugins: []

latency_injection_ms:
  terminal: 0
  read_file: 0
  patch: 0

model_endpoint:
  type: openai_chat_completions
  required_fields: [tools, tool_choice]
  forbidden_fields: [logprobs]

verifier:
  module: verifier
  fn: verify
  timeout_seconds: 10
