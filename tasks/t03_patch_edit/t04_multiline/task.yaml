id: t03_patch_edit/t04_multiline
name: "Patch a 30-line block"
version: 1
difficulty: 3
tags: [patch, multiline]

prompt: |
  The file `big_block.py` has a class `Foo` (~30 lines). Add a method `def bar(self): return 42` using a single `patch` call.

allowed_tools:
  - read_file
  - patch
  - terminal

forbidden_tools: []

max_turns: 10
max_tokens: 4096
timeout_seconds: 60
isolated_network: true

fixture:
  source: small_repo
  globs: ["**/*"]

sampling:
  temperature: 0.0
  top_p: 1.0
  top_k: -1
  seed: 42

resource_limits:
  max_memory_mb: 2048
  max_processes: 128
  max_file_size_mb: 100
  max_worktree_mb: 500

hermes_plugins: []

latency_injection_ms:
  terminal: 0
  read_file: 0
  patch: 0

model_endpoint:
  type: openai_chat_completions
  required_fields: [tools, tool_choice]
  forbidden_fields: [logprobs]

verifier:
  module: verifier
  fn: verify
  timeout_seconds: 10
