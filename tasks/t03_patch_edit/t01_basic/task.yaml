id: t03_patch_edit/t01_basic
name: "Add a zero-division check"
version: 1
difficulty: 2
tags: [patch, code-edit]

prompt: |
  The file `broken_divide.py` has a bug: no zero-division check. Use `patch` to add a guard that raises `ValueError` when `b == 0`.

allowed_tools:
  - read_file
  - patch
  - terminal

forbidden_tools: []

max_turns: 10
max_tokens: 4096
timeout_seconds: 60
isolated_network: true

fixture:
  source: small_repo
  globs: ["**/*"]

sampling:
  temperature: 0.0
  top_p: 1.0
  top_k: -1
  seed: 42

resource_limits:
  max_memory_mb: 2048
  max_processes: 128
  max_file_size_mb: 100
  max_worktree_mb: 500

hermes_plugins: []

latency_injection_ms:
  terminal: 0
  read_file: 0
  patch: 0

model_endpoint:
  type: openai_chat_completions
  required_fields: [tools, tool_choice]
  forbidden_fields: [logprobs]

verifier:
  module: verifier
  fn: verify
  timeout_seconds: 10
