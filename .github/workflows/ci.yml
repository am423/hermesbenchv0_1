name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: |
          ruff check hermesbench tests
          ruff format --check hermesbench tests
      - name: Type check
        run: mypy hermesbench --strict
      - name: Test
        run: |
          pytest --cov=hermesbench --cov-fail-under=80 tests/
      - name: Fixture lint
        run: |
          python -m hermesbench validate fixtures/ tasks/ --lint-only
